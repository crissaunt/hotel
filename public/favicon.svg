<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Soft Walnut Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#3E2723" />
  
  <!-- Outer Gold Border -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-dasharray="1 1" />
  <circle cx="50" cy="50" r="42" fill="none" stroke="#D4AF37" stroke-width="1" />

  <!-- Monogram D -->
  <text x="50" y="60" 
        font-family="'Playfair Display', 'Georgia', serif" 
        font-size="44" 
        font-weight="bold" 
        fill="#D4AF37" 
        text-anchor="middle"
        letter-spacing="0.5">D</text>

  <!-- Elegant Top Accent -->
  <path d="M 45 28 Q 50 25 55 28" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" />
  <!-- Elegant Bottom Accent -->
  <path d="M 45 72 Q 50 75 55 72" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" />
</svg>
